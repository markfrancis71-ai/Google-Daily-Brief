name: Refresh Live Data

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (GitHub may delay short intervals)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-live.txt

      - name: Fetch live data
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          USER_TIMEZONE: "America/Chicago"
        run: python fetch_live.py

      - name: Commit and push live.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live.json
          if git diff --cached --quiet; then
            echo "live.json unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "Refresh live data $(date -u +'%Y-%m-%dT%H:%MZ')"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push attempt $i failed; retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 3))
          done
          echo "::error::Failed to push live.json after 5 attempts"
          exit 1
