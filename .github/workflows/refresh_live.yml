name: Refresh Live Data

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (GitHub may delay short intervals)
  workflow_dispatch:

permissions:
  contents: write

# Serialize against the daily build so the two jobs never push concurrently.
concurrency:
  group: brief-push
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-live.txt

      - name: Fetch live data
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          USER_TIMEZONE: "America/Chicago"
        run: python fetch_live.py

      - name: Commit and push live.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live.json
          git diff --cached --quiet || {
            git commit -m "Refresh live data $(date -u +'%Y-%m-%dT%H:%MZ')"
            git pull --rebase origin main
            git push
          }
