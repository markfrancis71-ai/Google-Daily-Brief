name: Generate Daily Brief

on:
  schedule:
    - cron: "0 10 * * *"  # 10:00 UTC — adjust if you want a different Chicago time
  workflow_dispatch:        # allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate brief
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USER_TIMEZONE: "America/Chicago"
        run: python generate_brief.py

      - name: Commit and push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "index.html unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "Daily brief $(date +'%Y-%m-%d')"
          # Push with retry — live.json is owned by the refresh workflow, which
          # touches a different file, so a rebase here never conflicts.
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push attempt $i failed; retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 4))
          done
          echo "::error::Failed to push index.html after 5 attempts"
          exit 1
